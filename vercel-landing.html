<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JAY-JAY MEDICAL &mdash; Local Only</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --c-primary: #0d9488;
            --c-primary-dark: #0f766e;
            --c-bg: #f1f5f9;
            --c-text: #0f172a;
            --c-text-muted: #64748b;
            --c-border: #e2e8f0;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--c-bg);
            color: var(--c-text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .card {
            background: #fff;
            border: 1px solid var(--c-border);
            border-radius: 16px;
            box-shadow: 0 20px 45px rgba(15,23,42,.08);
            max-width: 520px;
            width: 100%;
            padding: 2.25rem;
            text-align: center;
        }
        .logo {
            width: 64px; height: 64px;
            margin: 0 auto 1.25rem;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--c-primary), var(--c-primary-dark));
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 12px 24px rgba(13,148,136,.35);
        }
        h1 { margin: 0 0 .35rem; font-size: 1.45rem; font-weight: 600; }
        .sub { color: var(--c-text-muted); margin: 0 0 1.5rem; font-size: .95rem; }
        .panel {
            background: #f8fafc;
            border: 1px solid var(--c-border);
            border-radius: 12px;
            padding: 1rem 1.15rem;
            margin: 0 0 1.25rem;
            text-align: left;
            font-size: .92rem;
            line-height: 1.55;
            color: var(--c-text);
        }
        .panel strong { color: var(--c-primary-dark); }
        code {
            background: #ecfeff;
            color: var(--c-primary-dark);
            padding: .15rem .45rem;
            border-radius: 6px;
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            font-size: .85em;
        }
        .foot { color: var(--c-text-muted); font-size: .82rem; margin-top: 1.25rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo"><i class="bi bi-capsule"></i></div>
        <h1>JAY-JAY MEDICAL</h1>
        <p class="sub">Tablet records &amp; expiry tracker</p>

        <div class="panel">
            This application runs <strong>locally only</strong> on the shop's WAMP server.
            It uses PHP + MySQL, which this hosting platform does not support.
            <br><br>
            To use the app, open it from the shop computer at
            <code>http://localhost/medical/</code>.
        </div>

        <div class="foot">
            &copy; <span id="y"></span> JAY-JAY MEDICAL &middot; Local-only deployment
        </div>
    </div>
    <script>document.getElementById('y').textContent = new Date().getFullYear();</script>
</body>
</html>
